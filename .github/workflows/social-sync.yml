# Keeps the website's "Recent Services & Sermons" section in sync with the
# church's YouTube channel — no one has to touch anything. Runs four times a
# day and can also be run by hand from the Actions tab ("Run workflow").
name: Refresh social feeds

on:
  schedule:
    - cron: "23 3,9,15,21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest YouTube videos
        run: python3 scripts/fetch_youtube.py
      - name: Commit if anything changed
        run: |
          git config user.name "site-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/latest-videos.json
          git diff --cached --quiet || { git commit -m "Auto-update latest YouTube videos"; git push; }
